name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Enable RDP + Firewall
        shell: powershell
        run: |
          Write-Host "=== ENABLE RDP ==="

          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fSingleSessionPerUser /t REG_DWORD /d 0 /f
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" /v UserAuthentication /t REG_DWORD /d 0 /f

          netsh advfirewall firewall delete rule name="RDP"
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

          sc config TermService start= auto
          net start TermService

          Start-Sleep -Seconds 10

          netstat -ano | findstr 3389

      - name: Create RDP User
        shell: powershell
        run: |
          $user = "RDP"

          if (Get-LocalUser -Name $user -ErrorAction SilentlyContinue) {
              net user $user /delete
          }

          $password = "P@ssw0rd!" + (Get-Random -Minimum 1000 -Maximum 9999)
          net user $user $password /add
          net localgroup administrators $user /add
          net localgroup "Remote Desktop Users" $user /add

          echo "RDP_USER=$user" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile ts.exe
          Start-Process .\ts.exe -ArgumentList "/silent" -Wait

      - name: Connect Tailscale
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-$env:GITHUB_RUN_ID

          $tsIP = $null
          for ($i=0; $i -lt 20; $i++) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              if ($tsIP) { break }
              Start-Sleep 5
          }

          if (-not $tsIP) {
              Write-Error "No Tailscale IP"
              exit 1
          }

          & "$env:ProgramFiles\Tailscale\tailscale.exe" status

          echo "TS_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Disable Firewall (force test)
        shell: powershell
        run: |
          Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False

      - name: Debug RDP Port
        shell: powershell
        run: |
          netstat -ano | findstr 3389
          qwinsta

      - name: Show Info + Keep Alive
        shell: powershell
        run: |
          Write-Host "`n=== RDP READY ==="
          Write-Host "IP: $env:TS_IP"
          Write-Host "User: $env:RDP_USER"
          Write-Host "Pass: $env:RDP_PASS"
          Write-Host "==================`n"

          while ($true) {
              Write-Host "$(Get-Date) alive"
              Start-Sleep 300
          }
