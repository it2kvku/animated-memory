name: win-rdp

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    - name: enable rdp
      shell: powershell
      run: |

        reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" `
         /v fDenyTSConnections /t REG_DWORD /d 0 /f

        netsh advfirewall firewall set rule group="remote desktop" new enable=Yes

        sc.exe config TermService start= auto
        sc.exe start TermService

        Start-Sleep 10


    - name: create user
      shell: powershell
      run: |

        $u="runner"
        $p="Rdp@" + (Get-Random -Minimum 1000 -Maximum 9999)

        cmd /c "net user $u $p /add"

        cmd /c "net localgroup administrators $u /add"

        cmd /c "net localgroup `"Remote Desktop Users`" $u /add"

        echo "USR=$u" >> $env:GITHUB_ENV
        echo "PWD=$p" >> $env:GITHUB_ENV


    - name: force rdp policy
      shell: powershell
      run: |

        reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services" `
         /v fDenyTSConnections /t REG_DWORD /d 0 /f

        reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services" `
         /v UserAuthentication /t REG_DWORD /d 0 /f

        gpupdate /force

        Restart-Service TermService -Force

        Start-Sleep 10


    - name: prepare session
      shell: powershell
      run: |

        qwinsta

        cmd /c "tscon 1 /dest:console" 2>$null

        Start-Sleep 5


    - name: install tailscale
      shell: powershell
      run: |

        Invoke-WebRequest `
         https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe `
         -OutFile ts.exe

        Start-Process ts.exe -ArgumentList "/silent" -Wait


    - name: connect tailscale
      shell: powershell
      run: |

        & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
          --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
          --hostname=gh-$env:GITHUB_RUN_ID

        Start-Sleep 15

        $ip=& "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

        echo "IP=$ip" >> $env:GITHUB_ENV


    - name: show login
      shell: powershell
      run: |

        Write-Host ""
        Write-Host "IP: $env:IP"
        Write-Host "USER: $env:USR"
        Write-Host "PASS: $env:PWD"

        netstat -ano | findstr 3389

        qwinsta


    - name: keep alive
      shell: powershell
      run: |

        while($true){

          Write-Host "alive"
          Start-Sleep 300

        }
