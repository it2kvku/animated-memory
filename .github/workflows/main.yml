name: System-Diagnostics-Windows

on:
  workflow_dispatch:

jobs:
  diagnostic-run:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Basic system info
        shell: pwsh
        run: |
          Write-Host "=== SYSTEM ==="
          hostname
          Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, OsHardwareAbstractionLayer
          Write-Host "`n=== NETWORK ==="
          ipconfig /all
          route print

      - name: Check Remote Desktop related settings
        shell: pwsh
        run: |
          Write-Host "=== RDP REGISTRY ==="
          reg query "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server"
          reg query "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp"

          Write-Host "`n=== SERVICES ==="
          Get-Service TermService, UmRdpService, SessionEnv | Format-Table -Auto

          Write-Host "`n=== FIREWALL RULES ==="
          Get-NetFirewallRule -DisplayGroup "Remote Desktop" |
            Select-Object DisplayName, Enabled, Direction, Action |
            Format-Table -Auto

          Write-Host "`n=== PORT 3389 ==="
          netstat -ano | findstr 3389

      - name: Create temporary local test user
        shell: pwsh
        run: |
          $user = "diaguser"
          $pass = "Diag@" + (Get-Random -Minimum 1000 -Maximum 9999)

          if (Get-LocalUser -Name $user -ErrorAction SilentlyContinue) {
            Remove-LocalUser -Name $user
          }

          $secure = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $user -Password $secure -AccountNeverExpires
          Add-LocalGroupMember -Group "Users" -Member $user

          Write-Host "Created temporary user: $user"
          Write-Host "Password: $pass"

      - name: Install Tailscale for diagnostics
        shell: pwsh
        run: |
          Invoke-WebRequest "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "$env:TEMP\tailscale.exe"
          Start-Process "$env:TEMP\tailscale.exe" -ArgumentList "/silent" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" version

      - name: Connect Tailscale
        shell: pwsh
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=diag-$env:GITHUB_RUN_ID
          Start-Sleep 10
          Write-Host "=== TAILSCALE STATUS ==="
          & "$env:ProgramFiles\Tailscale\tailscale.exe" status
          Write-Host "`n=== TAILSCALE IP ==="
          & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

      - name: Connectivity diagnostics
        shell: pwsh
        run: |
          $ip = (& "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 | Select-Object -First 1).Trim()
          Write-Host "Self Tailscale IP: $ip"
          Test-NetConnection -ComputerName $ip -Port 3389 | Format-List

      - name: Session diagnostics
        shell: pwsh
        run: |
          Write-Host "=== SESSIONS ==="
          qwinsta
          quser

      - name: Keep job alive briefly for inspection
        shell: pwsh
        run: |
          1..12 | ForEach-Object {
            Write-Host "Diagnostic heartbeat $_"
            Start-Sleep -Seconds 300
          }
