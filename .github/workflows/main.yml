name: System-Diagnostics-Windows

on:
  workflow_dispatch:

jobs:
  diagnostic-run:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    - name: Initialize Environment
      shell: pwsh
      run: |

        Write-Host "Preparing diagnostic environment..."

        # enable RDP
        Set-ItemProperty `
          -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
          -Name "fDenyTSConnections" -Value 0

        Set-ItemProperty `
          -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
          -Name "UserAuthentication" -Value 1

        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

        # ensure service running
        Set-Service TermService -StartupType Automatic
        Start-Service TermService

        Start-Sleep 8


    - name: Provision Debug User
      shell: pwsh
      run: |

        $charList = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#"

        $randomPassword = -join (1..16 | ForEach-Object {
            $charList[(Get-Random -Maximum $charList.Length)]
        })

        $user = "SystemDebug"
        $secPass = ConvertTo-SecureString $randomPassword -AsPlainText -Force

        if (Get-LocalUser $user -ErrorAction SilentlyContinue) {
            Remove-LocalUser $user
        }

        New-LocalUser `
          -Name $user `
          -Password $secPass `
          -FullName "Diagnostic Account" `
          -Description "Temporary debug session"

        Add-LocalGroupMember -Group "Administrators" -Member $user
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user

        echo "RDP_USER=$user" >> $env:GITHUB_ENV
        echo "RDP_PASS=$randomPassword" >> $env:GITHUB_ENV


    - name: Show Network Info
      shell: pwsh
      run: |

        Write-Host "IP addresses:"
        ipconfig

        Write-Host "Listening ports:"
        netstat -ano | findstr 3389


    - name: Maintain Session
      shell: pwsh
      run: |

        Write-Host ""
        Write-Host "=== SYSTEM DEBUG ACCESS ==="
        Write-Host "Username: $env:RDP_USER"
        Write-Host "Password: $env:RDP_PASS"
        Write-Host "==========================="
        Write-Host ""

        while ($true) {

          Write-Host "diagnostic session active"
          Start-Sleep 300

        }
